# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - doclensefinance

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: doclense.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_64E3644A231F4135B069931D10394751 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_9B6CD74BB8224F2082266DDFA77F11B3 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: doclense.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_64E3644A231F4135B069931D10394751 }}/doclense:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6BE9D1513D574B0CBDD316B22C1C6823 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8E44FA8D2B1347D28B651D13D67D2213 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5714BA2D56354FA19526D1C4170EEC10 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'doclensefinance'
          slot-name: 'Production'
          images: 'doclense.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_64E3644A231F4135B069931D10394751 }}/doclense:${{ github.sha }}'
          